[defaults]
inventory       = inventory.yml
roles_path      = roles
stdout_callback = default
result_format   = yaml
host_key_checking = False
retry_files_enabled = False
forks           = 5
# AWS SSM transfers files through S3, which is slow. Bump the default
# 10s task timeout so docker builds don't get killed mid-stream.
timeout         = 60
# SSM sessions land as `ssm-user`, who can't write to /home/ubuntu/.ansible.
# Park ansible's temp dir under /tmp where every login can write. The
# trailing `-${USER}` keeps two operators on the same host from colliding.
remote_tmp      = /tmp/.ansible-${USER}

[ssh_connection]
pipelining = True
