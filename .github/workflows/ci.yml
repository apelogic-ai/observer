name: CI

on:
  push:
    branches: [master]
    # Path filters intentionally broad — release-critical files outside
    # packages/ (lockfile, release script, install script, deploy infra,
    # CI/release workflow) need to gate the same way. Anything that
    # could change a shipped binary or its install path is in here.
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "scripts/**"
      - "install.sh"
      - "deploy/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "scripts/**"
      - "install.sh"
      - "deploy/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

jobs:
  agent-tests:
    name: Agent (tests + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      # Install at the workspace root — agent imports @observer/dashboard/runtime.
      - name: Install workspace dependencies
        run: bun install

      # Agent imports @observer/dashboard/runtime, which transitively
      # references dist/out.tar + dist/build-info.json via `with { type:
      # "file" }`. Those don't exist on a fresh checkout, so TS can't
      # resolve them. Stubs get overwritten when the real build runs.
      - name: Stub dashboard build artifacts
        run: bun packages/dashboard/scripts/ensure-stubs.ts

      - name: Typecheck
        working-directory: packages/agent
        run: bun run typecheck

      - name: Test
        working-directory: packages/agent
        run: bun run test

  dashboard-build:
    name: Dashboard (typecheck + static export + embed)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install workspace dependencies
        run: bun install

      - name: Typecheck (UI + server)
        working-directory: packages/dashboard
        run: bun run typecheck

      - name: Lint
        working-directory: packages/dashboard
        run: bun run lint

      # Runs next build + scripts/bundle-static.ts. The staleness guard in
      # bundle-static will fail if out/ is out of sync with the source tree.
      - name: Build (next build + bundle-static)
        working-directory: packages/dashboard
        run: bun run build

      - name: Smoke-check artifacts
        working-directory: packages/dashboard
        run: |
          test -f dist/out.tar
          test -f dist/build-info.json
          test -f out/index.html
          echo "build-info:"
          cat dist/build-info.json

  compile-smoke:
    name: Compile smoke (${{ matrix.target }})
    # Cheap sanity that the whole pipeline (workspace install → dashboard build
    # → agent compile with embedded assets) doesn't regress. Full matrix stays
    # in release.yml.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - target: linux-x64
            bun_target: bun-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install workspace dependencies
        run: bun install

      - name: Build dashboard
        working-directory: packages/dashboard
        run: bun run build

      - name: Compile observer binary
        working-directory: packages/agent
        run: |
          bun build --compile --target=${{ matrix.bun_target }} \
            src/cli.ts --outfile observer-${{ matrix.target }}

      - name: Verify binary
        working-directory: packages/agent
        run: |
          chmod +x observer-${{ matrix.target }}
          ./observer-${{ matrix.target }} --version
          ./observer-${{ matrix.target }} dashboard --help | head -5

  dashboard-e2e:
    name: Dashboard e2e (Playwright)
    runs-on: ubuntu-latest
    # See release.yml for the same reasoning — `--with-deps` apt-get
    # alone routinely runs 8–10min on cold runners.
    timeout-minutes: 20
    # Catches UI regressions (silent toolbar handlers, broken heatmap,
    # session ↔ commit linkage drift) that pure unit tests miss.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"
      - name: Install workspace dependencies
        run: bun install
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'packages/dashboard/package.json') }}
      - name: Install Playwright browser
        working-directory: packages/dashboard
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi
      - name: Build dashboard
        working-directory: packages/dashboard
        run: bun run build
      - name: Seed e2e fixture
        working-directory: packages/dashboard
        run: bun tests/e2e/seed.ts
      - name: Run Playwright tests
        working-directory: packages/dashboard
        env:
          CI: "1"
        run: bunx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/dashboard/test-results
            packages/dashboard/playwright-report
          retention-days: 7

  api-tests:
    name: API (tests + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        working-directory: packages/api
        run: bun install

      - name: Typecheck
        working-directory: packages/api
        run: bun run typecheck

      - name: Test
        working-directory: packages/api
        run: bun run test
