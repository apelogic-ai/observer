name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0)"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
          # darwin-x64 (Intel Macs) disabled — macos-13 runner pool is slow
          # to allocate. Re-enable when Intel Mac usage justifies the wait.
          # - os: macos-13
          #   target: darwin-x64
          #   bun_target: bun-darwin-x64
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
          - os: windows-latest
            target: windows-x64
            bun_target: bun-windows-x64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      # Workspace install — resolves @observer/dashboard link for the agent.
      - name: Install workspace dependencies
        run: bun install

      # The agent imports @observer/dashboard/runtime, which transitively
      # imports `embed.ts` (which references dist/out.tar +
      # dist/build-info.json via `with { type: "file" }`). Those don't exist
      # on a fresh checkout, so TypeScript can't resolve them and the agent
      # typecheck blows up. Drop in empty stubs before any typecheck step;
      # they get overwritten when the real dashboard build runs.
      - name: Stub dashboard build artifacts (for typecheck)
        run: bun packages/dashboard/scripts/ensure-stubs.ts

      # Quality gates — anything green on CI must stay green at release.
      # Without these the release path could ship regressions outside the
      # agent test suite.
      - name: Agent typecheck
        working-directory: packages/agent
        run: bun run typecheck

      - name: Agent tests
        working-directory: packages/agent
        run: bun run test

      - name: API typecheck
        working-directory: packages/api
        run: bun run typecheck

      - name: API tests
        working-directory: packages/api
        run: bun run test

      - name: Dashboard typecheck (UI + server)
        working-directory: packages/dashboard
        run: bun run typecheck

      - name: Dashboard lint
        working-directory: packages/dashboard
        run: bun run lint

      # Produces packages/dashboard/out/ + dist/out.tar + dist/build-info.json,
      # which the agent binary embeds via `with { type: "file" }`.
      - name: Build dashboard (static export + tarball)
        working-directory: packages/dashboard
        run: bun run build

      - name: Compile observer binary
        working-directory: packages/agent
        shell: bash
        run: |
          bun build --compile --target=${{ matrix.bun_target }} \
            src/cli.ts --outfile observer-${{ matrix.target }}${{ matrix.ext }}

      - name: Verify binary runs and embeds dashboard
        working-directory: packages/agent
        shell: bash
        run: |
          chmod +x observer-${{ matrix.target }}${{ matrix.ext }} || true
          ./observer-${{ matrix.target }}${{ matrix.ext }} --version
          ./observer-${{ matrix.target }}${{ matrix.ext }} dashboard --help | head -5

      - name: Generate checksum
        working-directory: packages/agent
        shell: bash
        run: |
          sha256sum observer-${{ matrix.target }}${{ matrix.ext }} > observer-${{ matrix.target }}${{ matrix.ext }}.sha256 \
            || shasum -a 256 observer-${{ matrix.target }}${{ matrix.ext }} > observer-${{ matrix.target }}${{ matrix.ext }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: observer-${{ matrix.target }}
          path: |
            packages/agent/observer-${{ matrix.target }}${{ matrix.ext }}
            packages/agent/observer-${{ matrix.target }}${{ matrix.ext }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Observer v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/observer-darwin-arm64/observer-darwin-arm64
            artifacts/observer-darwin-arm64/observer-darwin-arm64.sha256
            artifacts/observer-linux-x64/observer-linux-x64
            artifacts/observer-linux-x64/observer-linux-x64.sha256
            artifacts/observer-windows-x64/observer-windows-x64.exe
            artifacts/observer-windows-x64/observer-windows-x64.exe.sha256
          body: |
            ## Observer v${{ steps.version.outputs.version }}

            Single-binary AI trace collection + local dashboard.

            ### Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://observer.dev/install.sh | bash
            ```

            **Windows:** download `observer-windows-x64.exe` from the assets below.

            ### Available downloads
            - **macOS (Apple Silicon):** `observer-darwin-arm64`
            - **Linux (x64):** `observer-linux-x64`
            - **Windows (x64):** `observer-windows-x64.exe`
            - macOS Intel: not in this release — re-enable when needed.

            ### Quick start

            ```
            observer                 # first-run init wizard
            observer start           # background daemon (macOS/Linux only)
            observer dashboard run   # open the dashboard
            ```
